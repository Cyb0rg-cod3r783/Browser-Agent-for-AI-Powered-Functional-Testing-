<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Workflow Replayer</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <span class="logo-icon">⚙</span>
                <span>WorkflowBot</span>
            </div>
            <span class="version">v1.0.0</span>
        </div>

        <!-- Current Tab Display -->
        <div class="section">
            <div class="section-label">Current Tab</div>
            <div class="url-display">
                <span class="url-favicon">🌐</span>
                <span id="current-url" class="url-text">Loading active tab...</span>
            </div>
        </div>

        <!-- Active Recording Block -->
        <div id="recording-status" class="recording-info hidden">
            <div class="ri-label">
                <span class="dot-white" style="display: inline-block; vertical-align: middle; margin-right: 6px;"></span>
                Recording Active
            </div>
            <div id="recording-wf-details" class="ri-id">Initializing...</div>
            <div id="recording-steps-count" class="ri-steps">0 actions recorded</div>
        </div>

        <!-- Controls Section -->
        <div class="section" style="border-bottom: none; padding-top: 10px; padding-bottom: 10px;">
            <div class="controls" style="padding: 0; display: flex; gap: 8px;">
                <button id="start-recording" class="btn-record">
                    ⏺ Start Recording
                </button>
                <button id="stop-recording" class="btn-stop" disabled>
                    ⏹ Stop Recording
                </button>
            </div>
        </div>

        <!-- Status Message Indicator -->
        <div id="status-message" class="status hidden">
            <span class="status-icon">ℹ</span>
            <div class="status-body">
                <span class="status-title">System Message</span>
                <span id="status-text" class="status-detail">Ready</span>
            </div>
        </div>

        <!-- History/List Section -->
        <div class="section history-section">
            <div class="section-header">
                <div class="section-label">Recorded Workflows</div>
                <button id="clear-all-workflows" class="btn-clear">Clear All</button>
            </div>
            <ul id="workflow-list" class="history-list">
                <li class="history-empty">Loading workflows...</li>
            </ul>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
